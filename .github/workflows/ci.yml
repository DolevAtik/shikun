name: CI

# Until now nothing ran the gates: `check-contrast` and `check-logical-props`
# existed but were honour-system, and both Vercel and Render deploy from `main`
# on push. Accessibility under IS 5568 is a legal floor for a public body, and a
# floor that is only checked when someone remembers to check it is not a floor.
#
# This is what makes the a11y claim a guarantee rather than an intention.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The Prisma client is generated code that typecheck and the unit tests
      # both import. `pnpm build` would generate it, but typecheck runs first.
      - name: Generate Prisma client
        run: pnpm db:generate

      # Contrast + logical properties. These are the two that protect the
      # Hebrew/RTL and WCAG guarantees, and they fail the build, not a review.
      - name: Lint (a11y gates)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
