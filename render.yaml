# Render Blueprint — the NestJS API only.
#
# The web app stays on Vercel, and the database stays on Neon: Render's free
# Postgres is deleted 30 days after creation, which is not a demo that survives
# a month. Nothing here is Render-specific beyond the file name — the service
# binds $PORT and reads its config from the environment.
services:
  - type: web
    name: shikun-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: apps/api
    # pnpm workspace: install and build from the repository root, so that
    # @moch/contracts is compiled before the API that imports it.
    #
    # Migrations run here, in the build, rather than in the start command: the
    # free plan has no pre-deploy phase, and the start command re-runs on every
    # cold-start wake-up — so a `migrate deploy` there added seconds of `npx`
    # resolution and a DB round-trip to each wake before the API served traffic.
    # The build runs once per release; DATABASE_URL/DIRECT_URL are present in it.
    buildCommand: cd ../.. && corepack enable && pnpm install --frozen-lockfile && pnpm turbo run build --filter=@moch/api && cd apps/api && npx prisma migrate deploy
    # Boot is now just the process: instant on a cold-start wake-up.
    startCommand: node dist/src/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Neon: DATABASE_URL is the pooled string, DIRECT_URL the direct one.
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      # CORS. The browser reaches the API through the Next proxy, so this is a
      # second line of defence rather than the only one. Two origins now — the
      # employee app and the admin console. main.ts already splits on the comma.
      - key: WEB_ORIGIN
        value: https://shikun-web.vercel.app,https://shikun-admin.vercel.app
      # Object storage. Until these are set, everything works except uploads.
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
